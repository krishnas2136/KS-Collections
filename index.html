<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">

    <title>KS Collections</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; background-color: #fdf5f2; color: #333; }
        header { background: #eac8af; padding: 50px 20px; }
        h1 { margin: 0; color: #5d4037; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .design-card { background: white; margin: 15px; padding: 10px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 250px; }

        footer { background: #5d4037; color: white; padding: 20px; margin-top: 50px; }
        .btn { background: #d4a373; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; }

<body>

<header>
    <h1>Welcome to Krishna's Creative Studio</h1>
    <p>Aesthetic Designs | Boho Art | Digital Illustrations</p>
</header>

<section class="gallery">
    <div class="design-card">
        <h3>My Art Collection</h3>
        <p>Check out my latest designs on Redbubble!</p>
        <a href="APKA_REDBUBBLE_LINK" class="btn">Visit My Shop</a>
    </div>
</section>

<footer>
    <p>&copy; 2026 Krishna S. | B.Tech CSE Student & Digital Artist</p>
</footer>

</html>
