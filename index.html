<!DOCTYPE html>
<html lang="hi">
<head>

    <title>KS Collections | Digital Art Portfolio</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; text-align: center; background-color: #f3f0ff; color: #333; }

        .btn { background: #7c5cfc; color: white; padding: 12px 25px; text-decoration: none; border-radius: 30px; display: inline-block; margin-top: 15px; font-weight: bold; }

<section class="gallery">
